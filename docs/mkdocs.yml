site_name: ContraDito
site_description: Documentação do projeto da disciplina de MDS

theme:
  name: material
  palette:
    primary: custom # Cor da barra superior 
    accent: custom  # Cor dos botões e links
  features:
    - navigation.tabs # Isso aqui transforma o menu lateral em abas superiores!
    - navigation.top  # Adiciona um botão de "voltar ao topo"

nav:

  - 🏠 O Projeto:
      - Sobre o ContraDito: index.md
      - Escopo e Visão Geral: escopo.md

  - 💡 O Produto:
      - Manual do Usuário: manual.md
      - Entendendo o Score de Coerência: calculo-score.md
      - Transparência, LGPD e Dados: lgpd.md

  - 📋 Requisitos e Gestão:
      - Backlog e Requisitos: requisitos.md
      - Story Map e Personas: ux/personas.md
      - Protótipos e Figma: ux/prototipos.md
      - Sprints e Atas:
          - Sprint 0: sprints/sprint-0.md
          - Sprint 1: sprints/sprint-1.md
          - Sprint 2: sprints/sprint-2.md
          - Sprint 3: sprints/sprint-3.md
          - Sprint 4: sprints/sprint-4.md
          - Sprint 5: sprints/sprint-5.md
          - Sprint 6: sprints/sprint-6.md
 
  - 🏗️ Arquitetura e Engenharia:
      - Visão Geral da Arquitetura: arquitetura.md
      - Frontend e Interface: frontend.md
      - Engenharia de Dados (ETL): etl-dados.md
      - Banco de Dados (Supabase): supabase.md
      - Motor NLP e RAG: motor-nlp.md

  - 💻 Desenvolvimento:
      - Como Executar o Projeto: execucao.md
      - Integração e API: api.md
      - Decisões Arquiteturais (ADRs): adrs/index.md

  - 🏁 Encerramento:
      - Avaliação Final: avaliacao.md
      - Próximos Passos (Roadmap): roadmap.md
      - Links Úteis: links.md

extra_css:
  - stylesheets/extra.css
