name: Productivity Metrics Collection

on:
  schedule:
    - cron: '0 0 * * 0' # Todos os domingos à meia-noite
  workflow_dispatch: # Permite execução manual

jobs:
  collect-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: pip install -r docs/productivity/requirements.txt

      - name: Run Data Collection
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          cd docs/productivity
          python collect_metrics.py

      - name: Commit and Push Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add docs/docs/productivity/metrics.json
          git commit -m "chore(metrics): update productivity metrics [skip ci]" || exit 0
          git push
